name: Deploy

# Builds and publishes Docker images to GHCR for crm.allumefeumedia.com.
# The actual "ship it to the server" step is a placeholder — fill in the
# `deploy` job once you've picked a host (VPS, Railway, Fly.io, etc.) and
# added its access details as repo secrets.
on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE: ghcr.io/${{ github.repository }}-server
  WEB_IMAGE: ghcr.io/${{ github.repository }}-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: ${{ env.SERVER_IMAGE }}:${{ github.sha }},${{ env.SERVER_IMAGE }}:latest

      - uses: docker/build-push-action@v6
        with:
          context: ./web
          push: true
          build-args: |
            VITE_API_BASE_URL=https://crm.allumefeumedia.com
          tags: ${{ env.WEB_IMAGE }}:${{ github.sha }},${{ env.WEB_IMAGE }}:latest

  # TODO: once a host is chosen, add a job here that SSHes in (or calls the
  # platform's API) to pull the new images and restart the stack, e.g.:
  #
  # deploy:
  #   needs: build-and-push
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: appleboy/ssh-action@v1
  #       with:
  #         host: ${{ secrets.DEPLOY_HOST }}
  #         username: ${{ secrets.DEPLOY_USER }}
  #         key: ${{ secrets.DEPLOY_SSH_KEY }}
  #         script: |
  #           cd /opt/crm && docker compose pull && docker compose up -d
  #
  # DNS: point crm.allumefeumedia.com (A or CNAME) at the deploy target once
  # it exists, and set COOKIE_DOMAIN / CORS_ORIGIN / VITE_API_BASE_URL to
  # https://crm.allumefeumedia.com in that environment's config.
